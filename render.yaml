services:
  - type: web
    name: cric-broadcast-backed
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      python backend/build_index_on_startup.py
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
